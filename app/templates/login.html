<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - KeyzPanel</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon-32x32.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon-32x32.png') }}">

    <style>
        :root {
            --primary: #FF9900;
            --secondary: #232F3E;
            --light-bg: #FFFFFF;
            --border-color: #DDDDDD;
            --text-dark: #131921;
            --text-light: #565959;
            --success: #067D62;
            --info: #0066C0;
            --warning: #FFC107;
            --card-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            --gradient-primary: linear-gradient(135deg, #FF9900 0%, #FF8F00 100%);
        }
        
        body {
            font-family: 'Amazon Ember', Arial, sans-serif;
            background-color: #F3F3F3;
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            max-width: 400px;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 1rem;
        }
        
        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: var(--text-light);
            font-size: 1rem;
        }
        
        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border-radius: 4px;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.2);
        }
        
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #111;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-primary:hover {
            background-color: #e68a00;
            border-color: #e68a00;
            transform: translateY(-2px);
        }
        
        .alert {
            border-radius: 8px;
            border: none;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .alert-danger {
            background: linear-gradient(135deg, #fff3f3 0%, #ffe6e6 100%);
            border-left: 4px solid #dc3545;
            color: #721c24;
        }
        
        .alert-success {
            background: linear-gradient(135deg, #f0fff4 0%, #e6ffe6 100%);
            border-left: 4px solid var(--success);
            color: #155724;
        }
        
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
        }
        
        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .register-link a:hover {
            color: #e68a00;
        }
        
        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }
        
        .password-toggle:hover {
            color: var(--primary);
        }
        
        @media (max-width: 576px) {
            .login-container {
                padding: 2rem 1.5rem;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-shopping-bag me-2"></i>KEYZPANEL
            </div>
            <h1 class="login-title">Вход в аккаунт</h1>
            <p class="login-subtitle">Введите ваши данные</p>
        </div>

        <form method="POST" action="">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                        <i class="fas fa-{{ 'exclamation-triangle' if category == 'error' else 'check-circle' }} me-2"></i>
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <div class="mb-4">
                <label class="form-label">
                    Логин
                </label>
                <input type="text" name="username" class="form-control" placeholder="Введите ваш логин" required>
            </div>

            <div class="mb-4 position-relative">
                <label class="form-label">
                    Пароль
                </label>
                <div class="position-relative">
                    <input type="password" name="password" class="form-control" autocomplete="off" placeholder="Введите ваш пароль" required id="passwordInput">
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="passwordIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>Войти
            </button>

            <div class="register-link">
                <small>Еще нет аккаунта? <a href="/register">Зарегистрироваться</a></small>
            </div>
        </form>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.classList.remove('fa-eye');
                passwordIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordIcon.classList.remove('fa-eye-slash');
                passwordIcon.classList.add('fa-eye');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Автоматическое скрытие алертов через 5 секунд
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                setTimeout(() => {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }, 5000);
            });
        });
    </script>
</body>
</html>
